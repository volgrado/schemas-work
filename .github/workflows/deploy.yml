name: CI - Build and Test

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # NUEVO PASO: Instalar los navegadores para Playwright
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run linter
        run: npm run lint

      # El nombre del paso de test ha sido actualizado para mayor claridad
      - name: Run E2E and Unit Tests
        run: npm run test

      - name: Build project
        run: npm run build

<!doctype html>
<html lang="%lang%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- THEME AND MANIFEST -->
    <meta name="theme-color" content="#4299e1" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- FAVICON SET -->
    <!-- Main modern favicon -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <!-- Legacy ICO favicon -->
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <!-- PNG fallbacks for other browsers -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon-16x16.png"
      sizes="16x16"
      type="image/png"
    />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon-32x32.png"
      sizes="32x32"
      type="image/png"
    />
    <!-- Apple touch icon for iOS home screens -->
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />

    <!-- External Stylesheets -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
      integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV"
      crossorigin="anonymous"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

<!doctype html>
<html lang="%lang%">
  <head>
    <!--
      @file app.html
      @description
      The root HTML template for the SvelteKit application.
      It serves as the entry point for the browser and handles:
      - **Metadata:** SEO descriptions, viewport settings, and theme colors.
      - **Resource Hints:** Preloading critical assets (fonts) and preconnecting to APIs (Gemini) for performance.
      - **PWA Integration:** Linking the web manifest and defining icons for various platforms (iOS, Android, Desktop).
      - **SvelteKit Injection:** Placeholders (`%sveltekit.head%`, `%sveltekit.body%`) where the app is hydrated.
    -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO & Branding -->
    <title>Schemas.Work</title>
    <meta
      name="description"
      content="Structure your knowledge, visualize your ideas, and learn effectively with an AI-powered, offline-first tool."
    />

    <!-- THEME AND MANIFEST -->
    <!-- Defines the browser UI color (status bar, etc.) to match the app's theme -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#3C6EF4"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#8b5cf6"
    />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- FONT OPTIMIZATION -->
    <!-- Preload the variable font to reduce FOUT (Flash of Unstyled Text) -->
    <link
      rel="preload"
      href="/fonts/Inter-VariableFont_slnt,wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/Inter-Italic-VariableFont_opsz,wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- API OPTIMIZATION -->
    <!-- Warm up the connection to Google's AI service -->
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <!-- FAVICON SET -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon-16x16.png"
      sizes="16x16"
      type="image/png"
    />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon-32x32.png"
      sizes="32x32"
      type="image/png"
    />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- The Svelte app is injected here. 'display: contents' ensures the div doesn't affect grid layouts. -->
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

<!doctype html>
<html lang="%lang%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO & Branding -->
    <title>Schemas.Work</title>
    <meta
      name="description"
      content="Structure your knowledge, visualize your ideas, and learn effectively with an AI-powered, offline-first tool."
    />

    <!-- THEME AND MANIFEST -->
    <!-- The browser will automatically select the correct theme color based on the user's system preference -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#3C6EF4"
    />
    <meta
      name="theme-color"
      media="(pre-fers-color-scheme: dark)"
      content="#8b5cf6"
    />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

    <!-- FAVICON SET -->
    <!-- Main modern favicon -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <!-- Legacy ICO favicon -->
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <!-- PNG fallbacks for other browsers -->
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon-16x16.png"
      sizes="16x16"
      type="image/png"
    />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon-32x32.png"
      sizes="32x32"
      type="image/png"
    />
    <!-- Apple touch icon for iOS home screens -->
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

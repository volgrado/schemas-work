# wrangler.toml (Versión final y definitiva)

name = "schemas-work"
pages_build_output_dir = ".cloudflare/pages"

compatibility_date = "2024-03-01"

# Esta es la bandera que nos faltaba.
# nodejs_compat por sí sola a veces no es suficiente para la resolución de módulos
# en el momento de la construcción. Esta bandera activa un polyfill más completo.
compatibility_flags = ["nodejs_compat", "streams_enable_constructors"]